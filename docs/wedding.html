<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanna & Pontus Wedding details</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <header class="center">
        <img src="./images/logo.png" alt="Hanna & Pontus Wedding Logo" class="logo"/>
        <div class="language-flags">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Flag_of_Sweden.svg" alt="Swedish" class="flag" onclick="setLanguage('sv')"/>
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Flag_of_Finland.svg" alt="Finnish" class="flag" onclick="setLanguage('fi')"/>
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Flag_of_the_United_Kingdom_%281-2%29.svg" alt="English" class="flag" onclick="setLanguage('en')"/>
        </div>
    </header>
    <main class="container">
        <h1 data-i18n="wedding.mainHeading"></h1>
        <section class="card">
            <p data-i18n="wedding.welcome"></p>
            <section class="carousel" aria-label="Gallery">
                <ol class="carousel__viewport">
                    <li id="carousel__slide1" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-haissa2025.webp" alt="Hanna and Pontus 2025" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide2" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-haissa2024.webp" alt="Hanna and Pontus 2024" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide3" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-dolomites.webp" alt="Hanna and Pontus dolomites" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide4" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-fiordland.webp" alt="Hanna and Pontus fiordland" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide5" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-2023.webp" alt="Hanna and Pontus 2023" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide6" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-naxos.webp" alt="Hanna and Pontus in Naxos" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide7" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-parma.webp" alt="Hanna and Pontus in Parma" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                    <li id="carousel__slide8" tabindex="0" class="carousel__slide">
                    <div class="carousel__snapper">
                        <img src="./images/hp-ushuaia.webp" alt="Hanna and Pontus in Ushuaia" class="carousel_image" loading="lazy" width="1200" height="800"/>
                    </div>
                    </li>
                </ol>
                <div class="carousel__controls">
                    <button type="button" class="carousel__control carousel__control--prev" aria-label="Previous slide">‹</button>
                    <button type="button" class="carousel__control carousel__control--next" aria-label="Next slide">›</button>
                </div>
                <div class="carousel__dots" aria-label="Slide navigation"></div>
            </section>
        </section>
        <section class="card">
            <p data-i18n-html="wedding.details"></p>
            <p data-i18n="wedding.dress"></p>
            <p data-i18n-html="wedding.gift"></p>
            <p data-i18n="wedding.invite"></p>
        </section>
        <section class="card">
            <h2 data-i18n="wedding.travelTitle"></h2>
            <p data-i18n="wedding.travelBus"></p>
            <p data-i18n="wedding.travelHotels"></p>
            <div id="hotels-list"></div>
        </section>
        
        <section class="card">
            <h2 data-i18n="wedding.venueTitle"></h2>
            <p data-i18n-html="wedding.venueAddress"></p>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3665.0805594761323!2d23.25377422450267!3d62.657782607878254!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46863a692ead606b%3A0x4e9268e2623ddf4a!2sHiidenniementie%2011%2C%2061170%20Alavus!5e0!3m2!1sen!2sfi!4v1771260140691!5m2!1sen!2sfi"
                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>

        <section class="center">
            <button onclick="window.location.href='rsvp.html'" data-i18n="wedding.rsvpButton"></button>
        </section>


    </main>
    <footer class="center">
        <p id="footer-text"></p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
