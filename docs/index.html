<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="index.title">Hanna & Pontus Wedding</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
    <link rel="prefetch" href="wedding.html" as="document">
</head>
<body>
    <header class="center">
        <img src="./images/logo.png" alt="Hanna & Pontus Wedding Logo" class="logo"/>
        <div class="language-flags">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Flag_of_Sweden.svg" alt="Swedish" class="flag" onclick="setLanguage('sv')"/>
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Flag_of_Finland.svg" alt="Finnish" class="flag" onclick="setLanguage('fi')"/>
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Flag_of_the_United_Kingdom_%281-2%29.svg" alt="English" class="flag" onclick="setLanguage('en')"/>
    </div>

    </header>
    <main class="container center">
        <p data-i18n="index.prompt"></p>
        <form id="nameform">
            <input type="text" id="guestname" placeholder="" data-i18n-placeholder="index.placeholder" required/>
            <button type="submit" data-i18n="index.enter"></button>
        </form>
        <div id="error-message" style="color: red; display: none;"></div>
        <div id="loading-indicator" class="loading-container" style="display: none;">
            <div class="spinner"></div>
        </div>
    </main>
    <footer class="center">
        <p id="footer-text"></p>
    </footer>
    <script src="scripts.js"></script>
    <script>
        // Handle form submission for verification
        document.getElementById('nameform').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('guestname').value.trim();
            const errorDiv = document.getElementById('error-message');
            const loadingDiv = document.getElementById('loading-indicator');
            
            if (!name) return;
            
            // Show loading indicator and hide error message
            loadingDiv.style.display = 'flex';
            errorDiv.style.display = 'none';
            
            const result = await verifyGuest(name);
            if (result.success) {
                window.location.href = 'wedding.html';
            } else {
                // Hide loading indicator and show error message
                loadingDiv.style.display = 'none';
                const msg = result.message || t('index.errorNotFound');
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
